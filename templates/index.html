<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本转语音工具 v0.5</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>文本转语音工具 <span class="version-badge">v0.5</span></h1>
        </header>

        <div class="network-status" id="network-status">
            <span class="status-indicator" id="status-indicator">●</span>
            <span class="status-text" id="status-text">检查网络连接中...</span>
        </div>

        <div class="form-group voice-selection">
            <label for="voice-select">选择语音</label>
            <div class="voice-tools">
                <input type="search" id="voice-search" class="filename-input" placeholder="搜索音色、风格或地区">
                <button id="favorite-voice-btn" class="btn secondary-btn small-btn" type="button">收藏</button>
            </div>
            <select id="voice-select" class="voice-select">
                <option value="">加载中...</option>
            </select>
            <div class="voice-info">
                <span class="gender"></span>
                <span class="style"></span>
            </div>
            <div class="speed-selection">
                <label for="preset-select">场景预设</label>
                <select id="preset-select" class="speed-select">
                    <option value="">自定义</option>
                </select>
            </div>
            <div class="speed-selection">
                <label for="speech-rate-select">语速</label>
                <select id="speech-rate-select" class="speed-select">
                    <option value="0.75">0.75x</option>
                    <option value="0.9">0.9x</option>
                    <option value="1.0" selected>1.0x</option>
                    <option value="1.1">1.1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2.0">2.0x</option>
                </select>
            </div>
        </div>

        <div class="mode-tabs" role="tablist" aria-label="转换模式">
            <button type="button" class="mode-tab active" data-mode="single">单条文本</button>
            <button type="button" class="mode-tab" data-mode="batch">批量 TXT</button>
        </div>

        <section class="mode-panel active" id="single-panel">
            <div class="form-group">
                <div class="field-header">
                    <label for="text-input">文本内容</label>
                    <span id="text-counter">0/200000</span>
                </div>
                <textarea id="text-input" maxlength="200000" placeholder="请输入要转换的文本..."></textarea>
            </div>

            <div class="action-row">
                <button id="convert-btn" class="btn">转换为语音</button>
                <button id="preview-btn" class="btn secondary-btn" type="button">试听</button>
                <button id="single-cancel-btn" class="btn secondary-btn" type="button" disabled>取消任务</button>
            </div>

            <div class="preview-section" id="preview-section">
                <audio id="preview-audio" controls></audio>
            </div>

            <div class="loading" id="single-loading">
                <p>正在转换中，请稍候...</p>
            </div>

            <div class="batch-progress" id="single-progress">
                <div class="progress-track">
                    <div class="progress-bar" id="single-progress-bar"></div>
                </div>
                <div class="progress-text" id="single-progress-text">等待开始</div>
            </div>

            <div class="error-message" id="single-error">
                <p>转换过程中出现错误，请重试。</p>
            </div>

            <div class="batch-result-section" id="single-result-section">
                <div class="result-header">
                    <h2>转换进度</h2>
                    <button id="single-retry-failed-btn" class="btn small-btn secondary-btn" type="button" disabled>重试失败片段</button>
                </div>
                <div class="batch-results-list" id="single-results-list"></div>
            </div>

            <div class="download-section" id="single-download-section">
                <div class="form-group">
                    <input type="text" id="filename-input" class="filename-input" placeholder="输入保存的文件名（不需要.mp3后缀）">
                </div>
                <audio id="result-audio" controls></audio>
                <button id="download-btn" class="btn">下载音频</button>
            </div>
        </section>

        <section class="mode-panel" id="batch-panel">
            <div class="batch-upload">
                <input type="file" id="batch-files" accept=".txt,text/plain" multiple>
                <label for="batch-files" class="btn secondary-btn">选择 TXT 文件</label>
                <span class="file-summary" id="batch-file-summary">未选择文件</span>
            </div>

            <div class="batch-file-list empty" id="batch-file-list">未选择文件</div>

            <div class="action-row">
                <button id="batch-convert-btn" class="btn">批量转换</button>
                <button id="batch-clear-btn" class="btn secondary-btn" type="button">清空</button>
            </div>

            <div class="batch-progress" id="batch-progress">
                <div class="progress-track">
                    <div class="progress-bar" id="batch-progress-bar"></div>
                </div>
                <div class="progress-text" id="batch-progress-text">等待开始</div>
            </div>

            <div class="error-message" id="batch-error">
                <p>批量转换失败，请重试。</p>
            </div>

            <div class="batch-result-section" id="batch-result-section">
                <div class="result-header">
                    <h2>转换结果</h2>
                    <button id="batch-download-all-btn" class="btn small-btn" type="button">下载 ZIP</button>
                </div>
                <div class="batch-results-list" id="batch-results-list"></div>
            </div>
        </section>

        <section class="history-section" id="history-section">
            <div class="result-header">
                <h2>最近生成</h2>
                <button id="history-refresh-btn" class="btn small-btn secondary-btn" type="button">刷新</button>
            </div>
            <div class="batch-results-list empty" id="history-list">暂无历史记录</div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const MAX_TEXT_LENGTH = 200000;
            const MAX_BATCH_FILES = 20;
            const textInput = document.getElementById('text-input');
            const textCounter = document.getElementById('text-counter');
            const voiceSelect = document.getElementById('voice-select');
            const voiceSearch = document.getElementById('voice-search');
            const favoriteVoiceBtn = document.getElementById('favorite-voice-btn');
            const presetSelect = document.getElementById('preset-select');
            const speechRateSelect = document.getElementById('speech-rate-select');
            const convertBtn = document.getElementById('convert-btn');
            const previewBtn = document.getElementById('preview-btn');
            const previewSection = document.getElementById('preview-section');
            const previewAudio = document.getElementById('preview-audio');
            const resultAudio = document.getElementById('result-audio');
            const singleCancelBtn = document.getElementById('single-cancel-btn');
            const singleProgress = document.getElementById('single-progress');
            const singleProgressBar = document.getElementById('single-progress-bar');
            const singleProgressText = document.getElementById('single-progress-text');
            const singleResultSection = document.getElementById('single-result-section');
            const singleResultsList = document.getElementById('single-results-list');
            const singleRetryFailedBtn = document.getElementById('single-retry-failed-btn');
            const downloadSection = document.getElementById('single-download-section');
            const downloadBtn = document.getElementById('download-btn');
            const filenameInput = document.getElementById('filename-input');
            const singleLoading = document.getElementById('single-loading');
            const singleError = document.getElementById('single-error');
            const genderSpan = document.querySelector('.gender');
            const styleSpan = document.querySelector('.style');
            const statusIndicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            const modeTabs = document.querySelectorAll('.mode-tab');
            const modePanels = document.querySelectorAll('.mode-panel');
            const batchFileInput = document.getElementById('batch-files');
            const batchFileSummary = document.getElementById('batch-file-summary');
            const batchFileList = document.getElementById('batch-file-list');
            const batchConvertBtn = document.getElementById('batch-convert-btn');
            const batchClearBtn = document.getElementById('batch-clear-btn');
            const batchProgress = document.getElementById('batch-progress');
            const batchProgressBar = document.getElementById('batch-progress-bar');
            const batchProgressText = document.getElementById('batch-progress-text');
            const batchError = document.getElementById('batch-error');
            const batchResultSection = document.getElementById('batch-result-section');
            const batchResultsList = document.getElementById('batch-results-list');
            const batchDownloadAllBtn = document.getElementById('batch-download-all-btn');
            const historyList = document.getElementById('history-list');
            const historyRefreshBtn = document.getElementById('history-refresh-btn');

            let currentSingleJobId = '';
            let currentSingleJob = null;
            let singlePollTimer = null;
            let defaultDownloadName = '';
            let voices = [];
            let presets = [];
            let preferences = { favorite_voices: [], recent_voices: [] };
            let networkStatus = 'checking';
            let selectedBatchFiles = [];
            let currentBatchJobId = '';
            let batchPollTimer = null;
            let batchJobFinished = false;

            function showError(container, message) {
                const errorText = container.querySelector('p');
                errorText.textContent = message || '转换过程中出现错误，请重试。';
                container.classList.add('show');
            }

            function getErrorMessage(data, fallback) {
                if (data && data.error) {
                    if (typeof data.error === 'string') {
                        return data.error;
                    }
                    if (data.error.message) {
                        return data.error.message;
                    }
                }
                return fallback;
            }

            function hideError(container) {
                container.classList.remove('show');
            }

            function formatBytes(bytes) {
                if (!bytes) return '0 B';
                if (bytes < 1024) return `${bytes} B`;
                if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
                return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
            }

            function statusTextFor(status) {
                const labels = {
                    queued: '排队中',
                    pending: '等待中',
                    processing: '转换中',
                    finished: '已完成',
                    cancelled: '已取消',
                    done: '已完成',
                    failed: '失败'
                };
                return labels[status] || status;
            }

            function formatDuration(seconds) {
                if (seconds === null || seconds === undefined) return '估算中';
                if (seconds < 60) return `${Math.round(seconds)} 秒`;
                const minutes = Math.floor(seconds / 60);
                const restSeconds = Math.round(seconds % 60);
                return `${minutes} 分 ${restSeconds} 秒`;
            }

            function updateTextCounter() {
                textCounter.textContent = `${textInput.value.length}/${MAX_TEXT_LENGTH}`;
            }

            async function checkNetworkStatus() {
                try {
                    const response = await fetch('/health');
                    const data = await response.json();
                    networkStatus = data.network_connectivity ? 'connected' : 'disconnected';

                    if (data.network_connectivity) {
                        statusIndicator.textContent = '●';
                        statusIndicator.style.color = '#4CAF50';
                        statusText.textContent = '网络连接正常';
                    } else {
                        statusIndicator.textContent = '●';
                        statusIndicator.style.color = '#f44336';
                        statusText.textContent = '网络连接异常';
                    }
                } catch (error) {
                    networkStatus = 'error';
                    statusIndicator.textContent = '●';
                    statusIndicator.style.color = '#ff9800';
                    statusText.textContent = '无法检查网络状态';
                }
            }

            async function loadVoices() {
                try {
                    const preferencesResponse = await fetch('/preferences');
                    preferences = await preferencesResponse.json();
                    const response = await fetch('/voices');
                    voices = await response.json();
                    renderVoiceOptions();
                    updateVoiceInfo(voices.find(voice => voice.id === voiceSelect.value) || voices[0]);
                } catch (error) {
                    console.error('Failed to load voices:', error);
                    voiceSelect.innerHTML = '<option value="">加载失败</option>';
                }
            }

            async function loadPresets() {
                try {
                    const response = await fetch('/presets');
                    presets = await response.json();
                    presets.forEach(preset => {
                        const option = document.createElement('option');
                        option.value = preset.id;
                        option.textContent = preset.name;
                        presetSelect.appendChild(option);
                    });
                } catch (error) {
                    console.error('Failed to load presets:', error);
                }
            }

            function renderVoiceOptions() {
                const previousValue = voiceSelect.value;
                const query = voiceSearch.value.trim().toLowerCase();
                const favoriteSet = new Set(preferences.favorite_voices || []);
                const recentSet = new Set(preferences.recent_voices || []);

                const filteredVoices = voices
                    .filter(voice => {
                        if (!query) return true;
                        return [voice.name, voice.id, voice.gender, voice.style]
                            .join(' ')
                            .toLowerCase()
                            .includes(query);
                    })
                    .sort((a, b) => {
                        const aFavorite = favoriteSet.has(a.id) ? 1 : 0;
                        const bFavorite = favoriteSet.has(b.id) ? 1 : 0;
                        if (aFavorite !== bFavorite) return bFavorite - aFavorite;
                        const aRecent = recentSet.has(a.id) ? 1 : 0;
                        const bRecent = recentSet.has(b.id) ? 1 : 0;
                        if (aRecent !== bRecent) return bRecent - aRecent;
                        return a.name.localeCompare(b.name, 'zh-Hans-CN');
                    });

                voiceSelect.innerHTML = '';

                filteredVoices.forEach(voice => {
                    const option = document.createElement('option');
                    option.value = voice.id;
                    const markers = [
                        favoriteSet.has(voice.id) ? '★' : '',
                        recentSet.has(voice.id) ? '最近' : ''
                    ].filter(Boolean).join(' ');
                    option.textContent = markers ? `${markers} ${voice.name}` : voice.name;
                    voiceSelect.appendChild(option);
                });

                if (filteredVoices.some(voice => voice.id === previousValue)) {
                    voiceSelect.value = previousValue;
                }

                updateVoiceInfo(voices.find(voice => voice.id === voiceSelect.value));
            }

            function updateVoiceInfo(voice) {
                if (voice) {
                    genderSpan.textContent = `性别：${voice.gender}`;
                    styleSpan.textContent = `风格：${voice.style}`;
                    const favoriteSet = new Set(preferences.favorite_voices || []);
                    favoriteVoiceBtn.textContent = favoriteSet.has(voice.id) ? '取消收藏' : '收藏';
                } else {
                    genderSpan.textContent = '';
                    styleSpan.textContent = '';
                    favoriteVoiceBtn.textContent = '收藏';
                }
            }

            function setMode(mode) {
                modeTabs.forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.mode === mode);
                });
                modePanels.forEach(panel => {
                    panel.classList.toggle('active', panel.id === `${mode}-panel`);
                });
            }

            function renderBatchFiles() {
                batchFileList.innerHTML = '';
                batchFileList.classList.toggle('empty', selectedBatchFiles.length === 0);

                if (selectedBatchFiles.length === 0) {
                    batchFileSummary.textContent = '未选择文件';
                    batchFileList.textContent = '未选择文件';
                    return;
                }

                batchFileSummary.textContent = `已选择 ${selectedBatchFiles.length} 个文件`;

                selectedBatchFiles.forEach((file, index) => {
                    const row = document.createElement('div');
                    row.className = 'file-row';

                    const meta = document.createElement('div');
                    meta.className = 'file-meta';

                    const name = document.createElement('span');
                    name.className = 'file-name';
                    name.textContent = file.name;

                    const size = document.createElement('span');
                    size.className = 'file-size';
                    size.textContent = formatBytes(file.size);

                    const removeBtn = document.createElement('button');
                    removeBtn.type = 'button';
                    removeBtn.className = 'icon-btn';
                    removeBtn.dataset.removeIndex = index;
                    removeBtn.title = '移除文件';
                    removeBtn.textContent = '×';

                    meta.appendChild(name);
                    meta.appendChild(size);
                    row.appendChild(meta);
                    row.appendChild(removeBtn);
                    batchFileList.appendChild(row);
                });
            }

            function resetSingleJobView() {
                if (singlePollTimer) {
                    clearInterval(singlePollTimer);
                    singlePollTimer = null;
                }

                currentSingleJobId = '';
                currentSingleJob = null;
                defaultDownloadName = '';
                singleProgress.classList.remove('show');
                singleResultSection.classList.remove('show');
                downloadSection.classList.remove('show');
                singleProgressBar.style.width = '0%';
                singleProgressText.textContent = '等待开始';
                singleResultsList.innerHTML = '';
                singleCancelBtn.disabled = true;
                singleRetryFailedBtn.disabled = true;
            }

            function renderSingleJob(job) {
                currentSingleJob = job;
                currentSingleJobId = job.id;

                const progressPercent = job.total ? Math.round((job.completed / job.total) * 100) : 0;
                singleProgress.classList.add('show');
                singleProgressBar.style.width = `${progressPercent}%`;

                const etaText = job.estimated_remaining_seconds === null || job.estimated_remaining_seconds === undefined
                    ? '剩余时间估算中'
                    : `预计剩余 ${formatDuration(job.estimated_remaining_seconds)}`;
                singleProgressText.textContent = `已完成 ${job.completed}/${job.total} · 成功 ${job.success_count} · 失败 ${job.failed_count} · ${etaText}`;

                singleResultSection.classList.add('show');
                singleCancelBtn.disabled = !['queued', 'processing'].includes(job.status);
                singleRetryFailedBtn.disabled = job.failed_count === 0 || job.status === 'processing';
                downloadSection.classList.toggle('show', job.downloadable && job.status !== 'processing');
                updateResultAudio(job);

                if (job.download_name && !filenameInput.value.trim()) {
                    filenameInput.value = job.download_name;
                }

                singleResultsList.innerHTML = '';
                job.items.forEach(item => {
                    const row = document.createElement('div');
                    row.className = `result-row ${item.status}`;

                    const meta = document.createElement('div');
                    meta.className = 'result-meta';

                    const name = document.createElement('span');
                    name.className = 'file-name';
                    name.textContent = job.total > 1 ? `片段 ${item.index}` : '完整文本';

                    const detail = document.createElement('span');
                    detail.className = 'file-size';
                    const sizeText = item.size ? formatBytes(item.size) : statusTextFor(item.status);
                    detail.textContent = `${item.text_length} 字 · ${sizeText} · 尝试 ${item.attempts || 0} 次`;

                    meta.appendChild(name);
                    meta.appendChild(detail);

                    if (item.error) {
                        const error = document.createElement('span');
                        error.className = 'result-error';
                        error.textContent = item.error;
                        meta.appendChild(error);
                    }

                    row.appendChild(meta);

                    if (['failed', 'cancelled'].includes(item.status) && job.status !== 'processing') {
                        const retryButton = document.createElement('button');
                        retryButton.type = 'button';
                        retryButton.className = 'btn small-btn';
                        retryButton.dataset.retryItemId = item.id;
                        retryButton.textContent = '重试';
                        row.appendChild(retryButton);
                    } else {
                        const status = document.createElement('span');
                        status.className = `result-status ${item.status}`;
                        status.textContent = statusTextFor(item.status);
                        row.appendChild(status);
                    }

                    singleResultsList.appendChild(row);
                });
            }

            async function pollSingleStatus() {
                if (!currentSingleJobId) return;

                try {
                    const response = await fetch(`/jobs/${encodeURIComponent(currentSingleJobId)}`);
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(getErrorMessage(data, '无法获取转换任务状态'));
                    }

                    renderSingleJob(data);

                    if (['finished', 'cancelled'].includes(data.status)) {
                        singleLoading.classList.remove('show');
                        convertBtn.disabled = false;
                        singleCancelBtn.disabled = true;
                        loadHistory();
                        if (singlePollTimer) {
                            clearInterval(singlePollTimer);
                            singlePollTimer = null;
                        }
                    }
                } catch (error) {
                    showError(singleError, error.message || '无法获取转换任务状态');
                    singleLoading.classList.remove('show');
                    convertBtn.disabled = false;
                    singleCancelBtn.disabled = true;
                    if (singlePollTimer) {
                        clearInterval(singlePollTimer);
                        singlePollTimer = null;
                    }
                }
            }

            function startSinglePolling() {
                if (singlePollTimer) {
                    clearInterval(singlePollTimer);
                }
                singlePollTimer = setInterval(pollSingleStatus, 1200);
                pollSingleStatus();
            }

            async function retrySingleItem(itemId) {
                if (!currentSingleJobId || !itemId) return;

                try {
                    const response = await fetch(`/jobs/${encodeURIComponent(currentSingleJobId)}/items/${encodeURIComponent(itemId)}/retry`, {
                        method: 'POST'
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(getErrorMessage(data, '重试失败'));
                    }
                    singleLoading.classList.add('show');
                    convertBtn.disabled = true;
                    renderSingleJob(data);
                    startSinglePolling();
                } catch (error) {
                    showError(singleError, error.message || '重试失败');
                }
            }

            function updateResultAudio(job) {
                if (job && job.audio_url) {
                    resultAudio.src = job.audio_url;
                    resultAudio.style.display = 'block';
                } else {
                    resultAudio.removeAttribute('src');
                    resultAudio.style.display = 'none';
                }
            }

            async function loadHistory() {
                try {
                    const response = await fetch('/history');
                    const items = await response.json();
                    renderHistory(items);
                } catch (error) {
                    historyList.classList.add('empty');
                    historyList.textContent = '历史记录加载失败';
                }
            }

            function renderHistory(items) {
                historyList.innerHTML = '';
                historyList.classList.toggle('empty', items.length === 0);

                if (items.length === 0) {
                    historyList.textContent = '暂无历史记录';
                    return;
                }

                items.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'result-row done';

                    const meta = document.createElement('div');
                    meta.className = 'result-meta';

                    const title = document.createElement('span');
                    title.className = 'file-name';
                    title.textContent = item.title;

                    const detail = document.createElement('span');
                    detail.className = 'file-size';
                    detail.textContent = `${item.summary || '无摘要'} · ${item.text_length} 字 · 成功 ${item.success_count}/${item.total}`;

                    meta.appendChild(title);
                    meta.appendChild(detail);

                    const actions = document.createElement('div');
                    actions.className = 'row-actions';

                    if (item.audio_url) {
                        const playButton = document.createElement('button');
                        playButton.type = 'button';
                        playButton.className = 'btn small-btn secondary-btn';
                        playButton.dataset.historyAudio = item.audio_url;
                        playButton.textContent = '播放';
                        actions.appendChild(playButton);
                    }

                    const downloadLink = document.createElement('a');
                    downloadLink.className = 'btn small-btn';
                    downloadLink.href = item.download_url;
                    downloadLink.textContent = '下载';
                    actions.appendChild(downloadLink);

                    const deleteButton = document.createElement('button');
                    deleteButton.type = 'button';
                    deleteButton.className = 'btn small-btn secondary-btn';
                    deleteButton.dataset.historyDelete = item.id;
                    deleteButton.textContent = '删除';
                    actions.appendChild(deleteButton);

                    row.appendChild(meta);
                    row.appendChild(actions);
                    historyList.appendChild(row);
                });
            }

            function resetBatchJob() {
                if (batchPollTimer) {
                    clearInterval(batchPollTimer);
                    batchPollTimer = null;
                }

                if (currentBatchJobId && batchJobFinished) {
                    fetch(`/batch/job/${currentBatchJobId}`, { method: 'DELETE' }).catch(() => {});
                }

                currentBatchJobId = '';
                batchJobFinished = false;
                selectedBatchFiles = [];
                batchFileInput.value = '';
                batchProgress.classList.remove('show');
                batchResultSection.classList.remove('show');
                batchProgressBar.style.width = '0%';
                batchProgressText.textContent = '等待开始';
                batchConvertBtn.disabled = false;
                batchDownloadAllBtn.disabled = true;
                hideError(batchError);
                renderBatchFiles();
            }

            function renderBatchJob(job) {
                const progressPercent = job.total ? Math.round((job.completed / job.total) * 100) : 0;
                batchProgress.classList.add('show');
                batchProgressBar.style.width = `${progressPercent}%`;
                batchProgressText.textContent = `已完成 ${job.completed}/${job.total} · 成功 ${job.success_count} · 失败 ${job.failed_count}`;
                batchResultSection.classList.add('show');
                batchDownloadAllBtn.disabled = job.success_count === 0;

                batchResultsList.innerHTML = '';
                job.items.forEach(item => {
                    const row = document.createElement('div');
                    row.className = `result-row ${item.status}`;

                    const meta = document.createElement('div');
                    meta.className = 'result-meta';

                    const name = document.createElement('span');
                    name.className = 'file-name';
                    name.textContent = item.source_name;

                    const detail = document.createElement('span');
                    detail.className = 'file-size';
                    detail.textContent = `${item.text_length} 字 · ${item.size ? formatBytes(item.size) : statusTextFor(item.status)}`;

                    meta.appendChild(name);
                    meta.appendChild(detail);

                    if (item.error) {
                        const error = document.createElement('span');
                        error.className = 'result-error';
                        error.textContent = item.error;
                        meta.appendChild(error);
                    }

                    const status = document.createElement('span');
                    status.className = `result-status ${item.status}`;
                    status.textContent = statusTextFor(item.status);

                    row.appendChild(meta);

                    if (item.status === 'done') {
                        const downloadLink = document.createElement('a');
                        downloadLink.className = 'btn small-btn';
                        downloadLink.href = `/batch/download/${encodeURIComponent(job.id)}/${encodeURIComponent(item.id)}`;
                        downloadLink.textContent = '下载';
                        row.appendChild(downloadLink);
                    } else {
                        row.appendChild(status);
                    }

                    batchResultsList.appendChild(row);
                });
            }

            async function pollBatchStatus() {
                if (!currentBatchJobId) return;

                try {
                    const response = await fetch(`/batch/status/${currentBatchJobId}`);
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(getErrorMessage(data, '无法获取批量任务状态'));
                    }

                    renderBatchJob(data);

                    if (data.status === 'finished') {
                        batchJobFinished = true;
                        batchConvertBtn.disabled = false;
                        if (batchPollTimer) {
                            clearInterval(batchPollTimer);
                            batchPollTimer = null;
                        }
                    }
                } catch (error) {
                    showError(batchError, error.message || '无法获取批量任务状态');
                    batchConvertBtn.disabled = false;
                    if (batchPollTimer) {
                        clearInterval(batchPollTimer);
                        batchPollTimer = null;
                    }
                }
            }

            voiceSelect.addEventListener('change', function() {
                const selectedVoice = voices.find(v => v.id === this.value);
                updateVoiceInfo(selectedVoice);
            });

            voiceSearch.addEventListener('input', renderVoiceOptions);

            favoriteVoiceBtn.addEventListener('click', async function() {
                const selectedVoice = voiceSelect.value;
                if (!selectedVoice) return;
                const favoriteSet = new Set(preferences.favorite_voices || []);
                const nextFavorite = !favoriteSet.has(selectedVoice);

                try {
                    const response = await fetch(`/preferences/favorites/${encodeURIComponent(selectedVoice)}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ favorite: nextFavorite })
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(getErrorMessage(data, '收藏失败'));
                    }
                    preferences = data;
                    renderVoiceOptions();
                    voiceSelect.value = selectedVoice;
                    updateVoiceInfo(voices.find(voice => voice.id === selectedVoice));
                } catch (error) {
                    showError(singleError, error.message || '收藏失败');
                }
            });

            presetSelect.addEventListener('change', function() {
                const selectedPreset = presets.find(preset => preset.id === this.value);
                if (!selectedPreset) return;

                if (selectedPreset.voice) {
                    voiceSelect.value = selectedPreset.voice;
                    if (voiceSelect.value !== selectedPreset.voice) {
                        voiceSearch.value = '';
                        renderVoiceOptions();
                        voiceSelect.value = selectedPreset.voice;
                    }
                    updateVoiceInfo(voices.find(voice => voice.id === selectedPreset.voice));
                }
                if (selectedPreset.speech_rate) {
                    speechRateSelect.value = selectedPreset.speech_rate;
                }
            });

            modeTabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    setMode(this.dataset.mode);
                });
            });

            textInput.addEventListener('input', updateTextCounter);

            convertBtn.addEventListener('click', async function() {
                const text = textInput.value.trim();
                if (!text) {
                    alert('请输入要转换的文本');
                    return;
                }

                const selectedVoice = voiceSelect.value;
                if (!selectedVoice) {
                    alert('请选择语音');
                    return;
                }

                if (networkStatus === 'disconnected') {
                    alert('网络连接异常，无法使用语音转换功能。请检查网络连接后重试。');
                    return;
                }

                resetSingleJobView();
                singleLoading.classList.add('show');
                convertBtn.disabled = true;
                hideError(singleError);

                try {
                    const formData = new FormData();
                    formData.append('text', text);
                    formData.append('voice', selectedVoice);
                    formData.append('speech_rate', speechRateSelect.value || '1.0');

                    const response = await fetch('/convert', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(getErrorMessage(data, '转换失败'));
                    }

                    currentSingleJobId = data.id;
                    defaultDownloadName = data.download_name || '';
                    filenameInput.value = defaultDownloadName;
                    renderSingleJob(data);
                    startSinglePolling();
                } catch (error) {
                    showError(singleError, error.message || '转换过程中出现错误，请重试。');
                    singleLoading.classList.remove('show');
                    convertBtn.disabled = false;
                }
            });

            previewBtn.addEventListener('click', async function() {
                const text = textInput.value.trim();
                if (!text) {
                    alert('请输入要试听的文本');
                    return;
                }

                const selectedVoice = voiceSelect.value;
                if (!selectedVoice) {
                    alert('请选择语音');
                    return;
                }

                previewBtn.disabled = true;
                hideError(singleError);

                try {
                    const formData = new FormData();
                    formData.append('text', text);
                    formData.append('voice', selectedVoice);
                    formData.append('speech_rate', speechRateSelect.value || '1.0');

                    const response = await fetch('/preview', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(getErrorMessage(data, '试听失败'));
                    }
                    previewAudio.src = data.audio_url;
                    previewSection.classList.add('show');
                    previewAudio.play().catch(() => {});
                    await loadVoices();
                } catch (error) {
                    showError(singleError, error.message || '试听失败');
                } finally {
                    previewBtn.disabled = false;
                }
            });

            downloadBtn.addEventListener('click', function() {
                if (!currentSingleJobId) return;

                let downloadName = filenameInput.value.trim();
                if (!downloadName) {
                    downloadName = defaultDownloadName || 'speech';
                }

                const downloadUrl = `/jobs/${encodeURIComponent(currentSingleJobId)}/download?name=${encodeURIComponent(downloadName)}`;
                window.location.href = downloadUrl;
            });

            singleCancelBtn.addEventListener('click', async function() {
                if (!currentSingleJobId) return;

                try {
                    const response = await fetch(`/jobs/${encodeURIComponent(currentSingleJobId)}/cancel`, {
                        method: 'POST'
                    });
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(getErrorMessage(data, '取消失败'));
                    }
                    renderSingleJob(data);
                    pollSingleStatus();
                } catch (error) {
                    showError(singleError, error.message || '取消失败');
                }
            });

            singleRetryFailedBtn.addEventListener('click', async function() {
                if (!currentSingleJob) return;
                const failedItems = currentSingleJob.items.filter(item => ['failed', 'cancelled'].includes(item.status));
                if (failedItems.length === 0) return;
                await retrySingleItem(failedItems[0].id);
            });

            singleResultsList.addEventListener('click', async function(event) {
                const retryItemId = event.target.dataset.retryItemId;
                if (!retryItemId) return;
                await retrySingleItem(retryItemId);
            });

            batchFileInput.addEventListener('change', function() {
                const files = Array.from(this.files);
                const txtFiles = files.filter(file => file.name.toLowerCase().endsWith('.txt'));

                if (txtFiles.length !== files.length) {
                    alert('仅支持 TXT 文件');
                }

                if (txtFiles.length > MAX_BATCH_FILES) {
                    alert(`一次最多上传 ${MAX_BATCH_FILES} 个 TXT 文件`);
                }

                selectedBatchFiles = txtFiles.slice(0, MAX_BATCH_FILES);
                hideError(batchError);
                batchResultSection.classList.remove('show');
                batchProgress.classList.remove('show');
                renderBatchFiles();
            });

            batchFileList.addEventListener('click', function(event) {
                const removeIndex = event.target.dataset.removeIndex;
                if (removeIndex === undefined) return;

                selectedBatchFiles.splice(Number(removeIndex), 1);
                batchFileInput.value = '';
                renderBatchFiles();
            });

            batchConvertBtn.addEventListener('click', async function() {
                if (selectedBatchFiles.length === 0) {
                    alert('请选择 TXT 文件');
                    return;
                }

                const selectedVoice = voiceSelect.value;
                if (!selectedVoice) {
                    alert('请选择语音');
                    return;
                }

                if (networkStatus === 'disconnected') {
                    alert('网络连接异常，无法使用语音转换功能。请检查网络连接后重试。');
                    return;
                }

                hideError(batchError);
                batchConvertBtn.disabled = true;
                batchResultSection.classList.remove('show');
                batchProgress.classList.add('show');
                batchProgressBar.style.width = '0%';
                batchProgressText.textContent = '正在创建批量任务...';

                try {
                    const formData = new FormData();
                    formData.append('voice', selectedVoice);
                    formData.append('speech_rate', speechRateSelect.value || '1.0');
                    selectedBatchFiles.forEach(file => {
                        formData.append('files', file);
                    });

                    const response = await fetch('/batch/convert', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(getErrorMessage(data, '批量转换失败'));
                    }

                    currentBatchJobId = data.id;
                    batchJobFinished = false;
                    renderBatchJob(data);

                    if (batchPollTimer) {
                        clearInterval(batchPollTimer);
                    }
                    batchPollTimer = setInterval(pollBatchStatus, 1500);
                    pollBatchStatus();
                } catch (error) {
                    showError(batchError, error.message || '批量转换失败，请重试。');
                    batchProgress.classList.remove('show');
                    batchConvertBtn.disabled = false;
                }
            });

            batchDownloadAllBtn.addEventListener('click', function() {
                if (!currentBatchJobId) return;
                window.location.href = `/batch/download/${encodeURIComponent(currentBatchJobId)}`;
            });

            batchClearBtn.addEventListener('click', resetBatchJob);

            historyRefreshBtn.addEventListener('click', loadHistory);

            historyList.addEventListener('click', async function(event) {
                const audioUrl = event.target.dataset.historyAudio;
                const deleteId = event.target.dataset.historyDelete;

                if (audioUrl) {
                    resultAudio.src = audioUrl;
                    downloadSection.classList.add('show');
                    resultAudio.style.display = 'block';
                    resultAudio.play().catch(() => {});
                    return;
                }

                if (deleteId) {
                    const response = await fetch(`/history/${encodeURIComponent(deleteId)}`, { method: 'DELETE' });
                    if (response.ok) {
                        loadHistory();
                    }
                }
            });

            updateTextCounter();
            renderBatchFiles();
            batchDownloadAllBtn.disabled = true;
            checkNetworkStatus();
            loadPresets();
            loadVoices();
            loadHistory();
            setInterval(checkNetworkStatus, 30000);
        });
    </script>
</body>
</html>
